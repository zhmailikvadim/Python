<p>Can the emails signers and task owners receive from DocuSign be customized?</p>
<div class="TableHeaderBG" style="width: 100%; padding: 2px 2px; vertical-align: text-middle; text-align: left;"><strong>Answer</strong></div>
<p>The emails sent from DocuSign are controlled and configured by DocuSign. There are no configuration options for these emails in the Ariba interface like there are for other tasks.</p>
