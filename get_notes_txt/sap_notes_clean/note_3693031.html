<p id="__html1">ADS (Adobe Document Services) does not print GS1 DataMatrix code with AI (Application Identifier) 43xx</p>
<h3 class="section" data-toc-skip="" id="Solution">Solution</h3>
<p>After applying corresponding ADS SP/Patch, following 43xx AIs are supported:</p>
<ul>
<li>4300, 4302, 4303, 4304, 4306, 4308, 4320, 4321, 4322, 4324 and 4325</li>
