<p>Should we add IP Addresses to Includelist for Outbound Integration?</p>
<div class="TableHeaderBG" style="width: 100%; padding: 2px 2px; vertical-align: text-middle; text-align: left;"><strong>Answer</strong></div>
<p>IP Addresses need not be added to the Includelist anymore. If you are using AFD, the requests would be routed using TLS1.1 and 1.2 protocol.</p>
